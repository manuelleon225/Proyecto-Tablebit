name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Frontend
        run: |
          cd tablebit-frontend
          npm ci
          npm run build

      - name: Docker Build
        run: docker compose build

      - name: Deploy
        run: echo "Deploy step - add your deployment target here"
