services:
  app:
    build:
      context: ./tablebit-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: tablebit_prod
      DB_USERNAME: tablebit
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    volumes:
      - storage_data:/app/storage

  frontend:
    build:
      context: ./tablebit-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: tablebit_prod
      MYSQL_USER: tablebit
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  reverb:
    build:
      context: ./tablebit-backend
      dockerfile: Dockerfile
    command: php artisan reverb:start
    ports:
      - "8080:8080"
    environment:
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
    depends_on:
      - redis
      - app

  queue:
    build:
      context: ./tablebit-backend
      dockerfile: Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      - app
      - redis

volumes:
  mysql_data:
  redis_data:
  storage_data:
