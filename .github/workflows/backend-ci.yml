name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'tablebit-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'tablebit-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tablebit_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql, pdo_mysql

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: tablebit-backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('tablebit-backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: tablebit-backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env
        working-directory: tablebit-backend
        run: cp .env.example .env

      - name: Generate application key
        working-directory: tablebit-backend
        run: php artisan key:generate

      - name: Run migrations
        working-directory: tablebit-backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: tablebit_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Run tests
        working-directory: tablebit-backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: tablebit_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test
